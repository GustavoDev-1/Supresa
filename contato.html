<div class="form-container">

<h1>Envie uma mensagem 💌</h1>

<p>
Se quiser deixar uma mensagem especial,
escreva aqui. Cada palavra tem um significado.
</p>

<form id="formContato">

<div class="input-group">
<label>Nome</label>
<input type="text" id="nome" placeholder="Digite seu nome" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Digite seu email" required>
</div>

<div class="input-group">
<label>Mensagem</label>
<textarea id="mensagem" rows="5" placeholder="Escreva sua mensagem..." required></textarea>
</div>

<button type="submit">Enviar Mensagem ❤️</button>

<p id="status"></p>

</form>

</div>

<script src="script.js"></script>

</body>
